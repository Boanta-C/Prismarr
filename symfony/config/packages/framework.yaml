# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Sessions persistantes dans var/sessions (survivent aux restarts FrankenPHP)
    # Cookie name dédié pour cohabiter avec d'autres apps sur le même domaine (ex: Argos)
    session:
        handler_id: ~
        name: PRISMARR_SESSION
        cookie_secure: auto
        cookie_samesite: lax
        cookie_lifetime: 604800       # 7 jours
        gc_maxlifetime: 604800        # 7 jours d'inactivité avant expiration
        save_path: '%kernel.project_dir%/var/sessions'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
