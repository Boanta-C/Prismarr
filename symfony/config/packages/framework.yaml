# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Reverse-proxy awareness (Traefik, nginx, Caddy external, Cloudflare Tunnel)
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers:
        - x-forwarded-for
        - x-forwarded-proto
        - x-forwarded-host
        - x-forwarded-port
        - x-forwarded-prefix

    # Rate limit the wizard "Test connection" endpoint. The endpoint is
    # PUBLIC_ACCESS while setup is in progress (no admin yet) and issues a
    # cURL to a user-supplied URL — so without a limiter, an attacker reaching
    # the port during the install window could brute-force scan the LAN and
    # cloud metadata endpoints. 30 attempts/min per client is plenty for a
    # human tweaking URLs and tight enough to neuter scripted scans.
    rate_limiter:
        setup_test:
            policy: 'sliding_window'
            limit: 30
            interval: '1 minute'

    # Persistent sessions in var/data/sessions so they survive container
    # recreations (the var/data path is the one volume mounted in production).
    # Dedicated cookie name to coexist with other apps on the same domain (e.g. Argos)
    session:
        handler_id: ~
        name: PRISMARR_SESSION
        cookie_secure: auto
        cookie_samesite: lax
        cookie_httponly: true
        cookie_lifetime: 604800       # 7 days
        gc_maxlifetime: 604800        # 7 days of inactivity before expiration
        save_path: '%kernel.project_dir%/var/data/sessions'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
