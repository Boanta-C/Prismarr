framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 0
            failed: 'redis://redis:6379/messages_failed'
            sync: 'sync://'

        # Pas de routing async actif pour l'instant — les futurs messages Prismarr
        # (notifications, scheduled tasks) s'ajouteront ici.
        routing: {}
