setup:
  layout:
    title: Setup
  nav:
    step: 'Step {current}/{total}'
  stepper:
    welcome: Welcome
    admin: Account
    tmdb: TMDb
    managers: Media
    indexers: Indexers
    downloads: Downloads
    finish: Finish
  step:
    welcome:
      title: Welcome to Prismarr
      subtitle: 'A unified dashboard for your self-hosted media stack. A few minutes are enough to configure everything.'
      features:
        media: Movies & TV shows
        indexers: Indexers
        downloads: Downloads
        discovery: TMDb discovery
      cta: 'Start the setup →'
    admin:
      eyebrow: 'Step 2 of 7'
      title: Create your admin account
      subtitle: 'This account will have access to every Prismarr configuration option. You can create more users later from the admin area.'
      email: Email
      display_name: Display name
      display_name_optional: (optional)
      password: Password
      password_hint: (8 min.)
      password_confirm: Confirm
      toggle_visibility: Show/hide
      back: '← Back'
      cta: 'Create account →'
    tmdb:
      eyebrow: 'Step 3 of 7 · Optional'
      title: The Movie Database (TMDb)
      subtitle: 'Required for the <strong>Discover</strong> page (trending movies & TV shows, recommendations, watchlist). Create a free key on <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">themoviedb.org</a>. If you skip this step, Discover will be disabled.'
      api_key: API v3 key
      api_key_hint: 'v3 only — v4 (Bearer token) is not supported yet.'
    managers:
      eyebrow: 'Step 4 of 7 · Optional'
      title: Media managers
      subtitle: 'Radarr manages your movie library, Sonarr manages TV shows. You can configure both, only one, or skip this step.'
      radarr:
        section: '🎬 Radarr — Movies'
        subtitle: Automated movie management service.
      sonarr:
        section: '📺 Sonarr — TV Shows'
        subtitle: Automated TV show management service.
      fields:
        url: URL
        api_key: API key
    indexers:
      eyebrow: 'Step 5 of 7 · Optional'
      title: Indexers & requests
      subtitle: 'Prowlarr centralises your tracker indexers. Jellyseerr lets users request movies and TV shows, which are then sent to Radarr/Sonarr.'
      prowlarr:
        section: '🔎 Prowlarr — Indexers'
        subtitle: Indexer aggregator compatible with Radarr/Sonarr.
      jellyseerr:
        section: '🙋 Jellyseerr — User requests'
        subtitle: Request interface for end users.
    downloads:
      eyebrow: 'Step 6 of 7 · Optional'
      title: Download client
      subtitle: 'qBittorrent is your BitTorrent client. Gluetun is an optional VPN router that sits in front of qBittorrent to mask your IP.'
      qbittorrent:
        section: '⬇️ qBittorrent'
        subtitle: Authentication through the qBittorrent Web UI.
        user: Username
        password: Password
      gluetun:
        section: 'Gluetun'
        section_suffix: 'VPN — optional'
        subtitle: 'Leave blank if qBittorrent does not route through a VPN.'
        url: URL (Control Server)
        protocol: Protocol
        protocol_auto: Auto
        api_key: API key
        api_key_optional: (optional)
        api_key_placeholder: 'Bearer token if the Control Server is protected'
    finish:
      eyebrow: 'Step 7 of 7'
      title: "You're all set!"
      subtitle: "Here is a summary of your configuration. You can edit or add services at any time from the admin area."
      badge_configured: Configured
      badge_skipped: Skipped
      cta: 'Launch Prismarr →'
    common:
      back: '← Back'
      skip: Skip this step
      save_next: 'Save and continue →'

