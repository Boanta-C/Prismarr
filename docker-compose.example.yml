# Prismarr — docker-compose.yml user-facing.
#
# Usage :
#   1. Téléchargez ce fichier
#   2. docker compose up -d
#   3. Ouvrez http://localhost:7070
#   4. Suivez le wizard de configuration
#
# Au premier démarrage, Prismarr génère automatiquement ses secrets
# (APP_SECRET, MERCURE_JWT_SECRET) et crée la base SQLite. Tout est
# persisté dans le volume `prismarr_data`.

services:

  prismarr:
    image: prismarr/prismarr:latest
    container_name: prismarr
    restart: unless-stopped

    # Port exposé (changez à gauche du `:` si 7070 est déjà pris).
    ports:
      - "7070:7070"

    # Volume persistant — contient BDD SQLite, .env.local, sessions, cache.
    volumes:
      - prismarr_data:/var/www/html/var/data

volumes:
  prismarr_data:
