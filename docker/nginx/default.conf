server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Sécurité : masquer la version Nginx
    server_tokens off;

    # Taille max upload (avatars, imports)
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/argos_access.log;
    error_log  /var/log/nginx/argos_error.log warn;

    # Assets statiques : cache agressif si le fichier existe physiquement,
    # sinon passage à Symfony (AssetMapper dev server pour /assets/)
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff2?|ttf|eot|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.php$is_args$args;
    }

    # Symfony front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM
    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        # Timeouts pour les requêtes longues (releases interactives 90s+)
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;

        # Buffers
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;

        internal;
    }

    # Bloquer l'accès aux autres .php
    location ~ \.php$ {
        return 404;
    }

    # Mercure SSE — proxy vers le hub (WebSocket + SSE)
    # resolver Docker interne + variable = résolution DNS au runtime (pas au démarrage)
    location /.well-known/mercure {
        resolver 127.0.0.11 valid=10s;
        set $mercure http://mercure:3000;
        proxy_pass $mercure;
        proxy_read_timeout 24h;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Headers sécurité
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;
}
