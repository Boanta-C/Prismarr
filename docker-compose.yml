services:

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: prismarr_nginx
    restart: unless-stopped
    ports:
      - "${PRISMARR_PORT:-7070}:80"
    depends_on:
      - app
    networks:
      - prismarr_net

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: prismarr_app
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_PASSPHRASE=${JWT_PASSPHRASE}
      - MERCURE_JWT_SECRET=${MERCURE_JWT_SECRET}
    volumes:
      - symfony_var:/var/www/html/var
      - symfony_data:/var/www/html/var/data
    depends_on:
      - redis
    networks:
      - prismarr_net

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: prismarr_worker
    restart: unless-stopped
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_PASSPHRASE=${JWT_PASSPHRASE}
      - MERCURE_JWT_SECRET=${MERCURE_JWT_SECRET}
    volumes:
      - symfony_var:/var/www/html/var
      - symfony_data:/var/www/html/var/data
    depends_on:
      - app
      - redis
    networks:
      - prismarr_net

  redis:
    image: redis:7-alpine
    container_name: prismarr_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - prismarr_net

  mercure:
    image: dunglas/mercure
    container_name: prismarr_mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":3000"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins "*"
        anonymous
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    networks:
      - prismarr_net

volumes:
  redis_data:
  mercure_data:
  mercure_config:
  symfony_var:
  symfony_data:      # SQLite + uploads

networks:
  prismarr_net:
    driver: bridge
