# Prismarr — stack médias self-hosted (compose par défaut pour le développement).
# Pour la distribution publique, voir docker-compose.example.yml.

services:

  prismarr:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
    container_name: prismarr
    restart: unless-stopped
    ports:
      - "${PRISMARR_PORT:-7070}:7070"
    environment:
      # Tout le reste (APP_SECRET, MERCURE_JWT_SECRET, JWT_PASSPHRASE) est
      # auto-généré par docker/frankenphp/init.sh au premier démarrage et
      # persisté dans /var/www/html/var/data/.env.local (volume).
      - APP_ENV=${APP_ENV:-prod}
      - PRISMARR_PORT=${PRISMARR_PORT:-7070}
    volumes:
      - prismarr_data:/var/www/html/var/data

volumes:
  prismarr_data:  # SQLite + .env.local + sessions + cache persistants
